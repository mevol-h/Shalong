<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心理疗愈线下沙龙</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #2d6a4f 0%, #95d5b2 50%, #d8f3dc 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 420px;
      width: 100%;
    }
    .poster {
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .poster img {
      width: 100%;
      display: block;
    }
    .tip {
      color: #2d6a4f;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="poster">
      <img src="poster.png" alt="心理疗愈线下沙龙">
    </div>
    <p class="tip">👆 扫码参加活动</p>
  </div>
</body>
</html>
