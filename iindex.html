<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫码进群</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .container {
            background: white;
            padding: 40px 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 { font-size: 28px; color: #333; margin-bottom: 10px; }
        .subtitle { color: #666; font-size: 16px; margin-bottom: 30px; }
        .qrcode {
            padding: 15px;
            background: #f8f8f8;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 20px;
        }
        .qrcode img { display: block; width: 250px; height: 250px; }
        .tip { color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>扫码参加</h1>
        <p class="subtitle">扫码参加活动</p>
        <div class="qrcode">
            <img src="线下沙龙活动.png" alt="二维码">
        </div>
        <p class="tip">长按识别二维码参加活动</p>
    </div>
</body>
</html>
